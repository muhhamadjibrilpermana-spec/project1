<!-- Elemen Media Pendukung -->
<audio id="hackerMusic" loop src="musik_hacker_kamu.mp4"></audio>
<video id="backgroundVideo" loop playsinline muted>
    <source src="video_kaget_kamu.mp4" type="video/mp4">
</video>
<canvas id="matrixCanvas"></canvas>

<button id="musicToggleBtn">🎵 MUSIC: OFF</button>

<div class="wrapper">
    <!-- Panel Input -->
    <div class="input-panel">
        <div class="input-group">
            <label for="targetNumber">Target Number</label>
            <input type="text" id="targetNumber" placeholder="Contoh: 08123456789">
        </div>
        <div class="input-group">
            <label for="exploitMethod">Exploit Method</label>
            <select id="exploitMethod">
                <option>WhatsApp Daemon Exploit v2.4</option>
                <option>SQL Injection Bypass</option>
            </select>
        </div>
    </div>

    <!-- Kotak Terminal Log -->
    <div class="terminal" id="terminalBox">
        <div id="log1">> Awaiting Target Validation...</div>
        <div id="log2">> System idle. Ready for exploit framework.</div>
        <div id="log3"></div>
    </div>

    <!-- Struktur Tombol Flip -->
    <div class="card-container">
        <button id="flipButton" class="vibe-button">
            <div class="front" id="textTombol">START<br>EXPLOIT</div>
            <div class="back">🖕</div>
        </button>
    </div>
</div>
